  ## Source: amazon-inspector (ed4b99ef5ac5fd4f25fdd4844c49a608343d6596def04cfb9df850c40e927dc9)

  The package @squawk/mcp was found to contain malicious code.


  ## Source: ghsa-malware (7d06b20db1195e1e5566e553087c2be971625c4a648e9cbfe5c1e0e836b93aa9)

  Any computer that has this package installed or running should be considered fully
  compromised. All secrets and keys stored on that computer should be rotated immediately
  from a different computer. The package should be removed, but as full control of
  the computer may have been given to an outside entity, there is no guarantee that
  removing the package will remove all malicious software resulting from installing
  it.


  ## Source: google-open-source-security (5e1924464368f0c5816ee84e000cc47017f44045140feafbbc9e685d847ed5a5)

  This package was compromised as part of the "Mini Shai-Hulud is back" worm by the
  TeamPCP threat actor.


  The package will steal credentials and then propogate it to every package it has
  access to. The package also attempts to remain persistent.

  '
