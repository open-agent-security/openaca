name: Publish PyPI

# Publishes the `openaca` Python package to PyPI from version Git tags.
#
# One-time PyPI setup:
# 1. PyPI project: openaca
# 2. Add a Trusted Publisher for this repository:
#    - Owner: open-agent-security
#    - Repository: openaca
#    - Workflow name: publish-pypi.yml
#    - Environment name: pypi
# 3. Publish by pushing a tag whose name matches pyproject.toml's version,
#    e.g. `git tag v0.1.0b2 && git push origin v0.1.0b2`.
#
# No PyPI token is needed. `pypa/gh-action-pypi-publish` exchanges the
# GitHub OIDC token for a short-lived PyPI publish token.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "::error::Tagged commit $(git rev-parse --short HEAD) is not reachable from origin/main. Release tags must be cut from main."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Sync deps
        run: uv sync --frozen

      - name: Verify tag matches package version
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject.toml version $package_version"
            exit 1
          fi

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

      - name: Lint overlay corpus
        run: uv run openaca lint overlays/

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openaca/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
