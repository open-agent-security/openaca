name: OpenACA Scan
description: Scan agent-installation manifests with OpenACA overlays.
author: open-agent-security
branding:
  icon: shield
  color: gray-dark

# V0 invocation surface. Future versions may add: --format json (besides
# SARIF), explicit allow-list / suppress-list inputs, action-side caching
# of the static export. Out of scope for V0 per docs/plans/005-reference-action.md.

inputs:
  target:
    description: Path to scan (defaults to the consumer's GITHUB_WORKSPACE).
    required: false
    default: ${{ github.workspace }}
  sarif:
    description: SARIF output path (relative to the consumer's workspace).
    required: false
    default: openaca-results.sarif
  fail-on:
    description: Severity threshold for non-zero exit (high | any | none).
    required: false
    default: any

outputs:
  sarif-path:
    description: Path to the generated SARIF file.
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Sync action deps
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv sync --frozen

    - id: scan
      name: Run openaca-scan
      shell: bash
      working-directory: ${{ github.action_path }}
      # Workflow-injection safety: read user-controllable inputs via env:
      # and reference them as quoted shell vars. Direct ${{ }} interpolation
      # in run: lets a malicious manifest filename / sarif path execute
      # arbitrary shell. The runner sets these env vars before the script
      # runs, so the values land via process env, not via shell substitution.
      env:
        TARGET: ${{ inputs.target }}
        SARIF: ${{ inputs.sarif }}
        FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Resolve relative paths against caller workspace so they land in the
        # consumer repo, not inside the action checkout (working-directory is
        # github.action_path, so bare relative paths would be misrouted).
        TARGET_ABS="$TARGET"
        if [[ "$TARGET_ABS" != /* ]]; then
          TARGET_ABS="$GITHUB_WORKSPACE/$TARGET_ABS"
        fi
        SARIF_ABS="$SARIF"
        if [[ "$SARIF_ABS" != /* ]]; then
          SARIF_ABS="$GITHUB_WORKSPACE/$SARIF_ABS"
        fi
        uv run openaca scan repo \
          --target "$TARGET_ABS" \
          --sarif "$SARIF_ABS" \
          --fail-on "$FAIL_ON" \
          --format github
        echo "sarif-path=$SARIF_ABS" >> "$GITHUB_OUTPUT"
