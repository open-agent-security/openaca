name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Skip the gates on chore/setup PRs that don't have Python sources yet.
      # Without this, `uv sync --frozen` fails on a clean repo because there's
      # no pyproject.toml/uv.lock to install from. Once the first pyproject.toml
      # lands, the rest of the workflow runs.
      - id: project_check
        name: Detect Python project files
        run: |
          if [ -f pyproject.toml ] && [ -f uv.lock ]; then
            echo "have_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_project=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No pyproject.toml + uv.lock yet — skipping lint/test gates."
          fi

      - name: Install uv
        if: steps.project_check.outputs.have_project == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Match pyproject.toml `requires-python`. Pinning here in CI catches
          # any newer-syntax regressions that would break the lower bound.
          # `python-version` here both installs that interpreter AND sets
          # UV_PYTHON so every subsequent `uv sync`/`uv run` uses it.
          python-version: "3.11"

      - name: Sync deps
        if: steps.project_check.outputs.have_project == 'true'
        # `--frozen` forbids re-resolution: CI installs exactly what's in the
        # committed uv.lock instead of silently picking up newer transitive
        # versions. If uv.lock is missing or stale vs. pyproject.toml, this
        # fails fast — exactly what we want in CI.
        run: uv sync --frozen

      - name: Ruff check
        if: steps.project_check.outputs.have_project == 'true'
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.project_check.outputs.have_project == 'true'
        run: uv run ruff format --check .

      - name: Pyright
        if: steps.project_check.outputs.have_project == 'true'
        run: uv run pyright

      - name: Pytest
        if: steps.project_check.outputs.have_project == 'true'
        run: uv run pytest --cov=tools --cov-report=term-missing

      - name: Lint overlay corpus
        if: steps.project_check.outputs.have_project == 'true'
        run: |
          if [ -d overlays ] && [ "$(find overlays -name '*.yaml' -print -quit)" ]; then
            uv run openaca lint overlays/
          else
            echo "::notice::no overlays present yet; skipping openaca lint"
          fi

  # lint-and-test installs from the committed uv.lock (--frozen) — the *dev*
  # env. End users run `uv tool install` from PyPI, which ignores uv.lock and
  # re-resolves deps from this package's metadata (pyproject constraints). That
  # path once shipped a dep pre-release that broke the CLI at runtime. This job
  # exercises it: build the wheel, install with deps resolved fresh (mirroring
  # scripts/install.sh's --prerelease=explicit), then run the user-facing
  # commands — so a too-loose constraint fails CI here, not a user's shell.
  # No network calls: the scan fixture has no OSV-queryable components, and
  # the remote sync targets an unreachable port (per linter discipline,
  # external APIs must not gate PRs).
  smoke-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Build wheel
        run: uv build --wheel
      - name: Install the wheel with deps resolved fresh (no lock)
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python --prerelease=explicit dist/*.whl
      - name: Smoke — user-facing commands against freshly-resolved deps
        run: |
          set -eu
          openaca=/tmp/smoke/bin/openaca

          "$openaca" --version

          # scan repo: parsers + matcher + renderer wiring. The remote-MCP
          # fixture yields a real component but no OSV-queryable PURL.
          mkdir -p /tmp/smoke-target
          cat > /tmp/smoke-target/mcp.json <<'FIXTURE'
          {"mcpServers": {"remote": {"type": "http", "url": "https://api.example.test/mcp"}}}
          FIXTURE
          "$openaca" scan repo --target /tmp/smoke-target --include-posture --fail-on none

          # bom repo: BOM build + serialization wiring.
          "$openaca" bom repo --target /tmp/smoke-target --output /tmp/smoke-bom.json
          test -s /tmp/smoke-bom.json

          # remote configure + sync: config, endpoint collection, and the
          # HTTP client stack. The API is an unreachable port, so a healthy
          # CLI exits 2 with its network-failure message; a dependency
          # breakage surfaces as a crash (exit 1 / traceback) and fails here.
          export HOME=/tmp/smoke-home
          mkdir -p "$HOME"
          OPENACA_REMOTE_TOKEN=ot_SMOKE "$openaca" remote configure --api-url http://127.0.0.1:9
          set +e
          out=$("$openaca" remote sync endpoint 2>&1)
          code=$?
          set -e
          printf '%s\n' "$out"
          if [ "$code" -ne 2 ]; then
            echo "expected exit 2 (clean network failure), got $code" >&2
            exit 1
          fi
          if printf '%s' "$out" | grep -q "Traceback"; then
            echo "remote sync crashed instead of failing cleanly" >&2
            exit 1
          fi
          echo "smoke ok: CLI surfaces work against freshly-resolved deps"
