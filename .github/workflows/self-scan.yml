name: Self-scan

# Dogfood the Action: scan this repo's own manifests on every PR and on
# pushes to main. Doubles as a CI smoke-test for action.yml.
#
# `fail-on: none` because the database repo's manifests would naturally
# reference advisory-targeted packages (e.g., test fixtures pin
# @cyanheads/git-mcp-server@1.1.0 specifically to demonstrate detection
# in test_e2e.py / test_scan.py). Findings here are self-references, not
# vulnerabilities — we surface them as a downloadable artifact without
# blocking the build.
#
# Why artifact-upload instead of code-scanning SARIF upload: GitHub
# code-scanning SARIF ingestion requires GitHub Advanced Security on
# private repos. OpenACA is private until V0 launch. When the repo goes
# public (or GHAS is enabled), swap the `actions/upload-artifact` step
# below for `github/codeql-action/upload-sarif@v3` and add
# `security-events: write` to permissions.
#
# Workflow-injection safety: this file does not consume any user-
# /PR-controlled input. github.workspace and github.ref are runner-set
# fixed values, not attacker-influenced. The Action it invokes (action.yml)
# uses env:-based input handling for the values that ARE user-controllable
# (target/sarif/fail-on).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: self-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openaca-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenACA scan against this repo
        uses: ./
        with:
          target: ${{ github.workspace }}
          sarif: ${{ github.workspace }}/openaca-results.sarif
          fail-on: none

      - name: Upload SARIF as workflow artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openaca-self-scan-sarif
          path: ${{ github.workspace }}/openaca-results.sarif
          retention-days: 7
          if-no-files-found: warn
