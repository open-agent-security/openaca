[project]
name = "asve"
version = "0.0.1"
description = "Agent-context overlays and scanner for agent stack security."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "click>=8.1",
    "cvss>=3.6",
    "jinja2>=3.1",
    "jsonschema>=4.21",
    "packaging>=24.0",
    "pathspec>=0.12",
    "pydantic>=2.6",
    "pyyaml>=6.0",
]

[project.scripts]
asve-lint = "tools.lint:main"
asve-export = "tools.export:main"
asve-scan = "tools.scan:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]
force-include = { "overlays" = "overlays" }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pyright>=1.1",
    "ruff>=0.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
