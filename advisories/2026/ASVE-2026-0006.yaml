schema_version: 1.7.5
id: ASVE-2026-0006
type: vulnerability
aliases:
- CVE-2026-20205
summary: Token leak via logs in Splunk MCP Server
details: Splunk MCP Server below 1.0.3 improperly handles sensitive authentication
  data during logging operations, exposing session and authorization tokens in clear
  text. Users with access to the `_internal` index or the `mcp_tool_admin` capability
  can extract credentials from log files (CWE-532). The vulnerability requires Splunk
  admin-level privileges to exploit.
