name: Publish PyPI

# Publishes the `openaca` Python package to PyPI from version Git tags.
#
# One-time PyPI setup:
# 1. PyPI project: openaca
# 2. Add a Trusted Publisher for this repository:
#    - Owner: open-agent-security
#    - Repository: openaca
#    - Workflow name: publish-pypi.yml
#    - Environment name: pypi
# 3. Publish by pushing a tag whose name matches pyproject.toml's version,
#    e.g. `git tag v0.1.0b2 && git push origin v0.1.0b2`.
#
# No PyPI token is needed. `pypa/gh-action-pypi-publish` exchanges the
# GitHub OIDC token for a short-lived PyPI publish token.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "::error::Tagged commit $(git rev-parse --short HEAD) is not reachable from origin/main. Release tags must be cut from main."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Sync deps
        run: uv sync --frozen

      - name: Verify tag matches package version
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject.toml version $package_version"
            exit 1
          fi

      - name: Verify release notes file exists
        # Fail BEFORE PyPI publish if no notes file is committed. PyPI
        # publishes are immutable — a missing notes file caught after
        # publish would mean shipping to PyPI but leaving the GitHub
        # Releases page silently inconsistent (which is what historically
        # happened for b1, b2, b3, b4, b6). The release-openaca skill
        # writes this file during the release prep PR. GITHUB_REF_NAME is
        # a GitHub-injected env var (the tag name), not user input — it
        # only contains git-ref-safe characters.
        run: |
          notes_path="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_path" ]; then
            echo "::error::missing release notes file at $notes_path. The release-openaca skill drafts this file from the commit log; run it before tagging."
            exit 1
          fi

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

      - name: Lint overlay corpus
        run: uv run openaca lint overlays/

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openaca/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release-github:
    # Create the GitHub Release object so the Releases page reflects what
    # actually shipped. Runs only after PyPI publish succeeds — if PyPI
    # failed there's no reason to advertise the release on GitHub. The
    # notes file's presence was verified in the build job, so the only
    # failure modes here are gh/API errors.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create writes the release
    steps:
      - uses: actions/checkout@v4
        # Need the tag's tree (notes file) plus the tag ref itself.
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          notes_path="docs/releases/${TAG}.md"
          # The first H1 line in the notes file becomes the Release title.
          # If the file doesn't have one, fall back to the tag name.
          title="$(grep -m1 '^# ' "$notes_path" | sed 's/^# //' || true)"
          if [ -z "$title" ]; then
            title="$TAG"
          fi
          # Mark PEP 440 pre-releases (aN/bN/rcN suffix) as GitHub
          # prereleases. `gh release create` defaults to "latest stable"
          # unless --prerelease is passed; without this, beta tags like
          # v0.1.0b6 incorrectly appear as stable on the Releases page.
          prerelease_flag=""
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$ ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$title" \
            --notes-file "$notes_path" \
            --verify-tag \
            $prerelease_flag
